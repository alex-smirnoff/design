<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="36%" cy="28%" r="75%">
      <stop offset="0%"   stop-color="#0d0d28"/>
      <stop offset="100%" stop-color="#04040d"/>
    </radialGradient>
    <radialGradient id="orb" cx="34%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#b8f4ff"/>
      <stop offset="14%"  stop-color="#44aaff"/>
      <stop offset="38%"  stop-color="#7722ee"/>
      <stop offset="72%"  stop-color="#1c0845"/>
      <stop offset="100%" stop-color="#05030e"/>
    </radialGradient>
    <radialGradient id="atmo" cx="50%" cy="50%" r="50%">
      <stop offset="52%"  stop-color="#3d6fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3d6fff" stop-opacity="0.40"/>
    </radialGradient>
    <radialGradient id="spec" cx="38%" cy="32%" r="58%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.80"/>
      <stop offset="65%"  stop-color="#aaddff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#aaddff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rim" cx="70%" cy="72%" r="45%">
      <stop offset="0%"   stop-color="#8833ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8833ff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="c">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
  </defs>

  <g clip-path="url(#c)">
    <!-- Background -->
    <rect width="32" height="32" fill="url(#bg)"/>

    <!-- Atmospheric halo -->
    <circle cx="16" cy="16" r="15" fill="url(#atmo)"/>

    <!-- Sphere body -->
    <circle cx="16" cy="16" r="11" fill="url(#orb)"/>

    <!-- Plasma back-rim light (bottom-right) -->
    <circle cx="16" cy="16" r="11" fill="url(#rim)"/>

    <!-- Specular highlight (top-left) -->
    <ellipse cx="12.6" cy="12" rx="3.6" ry="2.4" fill="url(#spec)"/>
  </g>
</svg>